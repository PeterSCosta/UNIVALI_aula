<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculadora">

        <div class="display">
            <div class="display-expressao" id="expressao">&nbsp;</div>
            <div class="display-resultado" id="resultado">0</div>
        </div>

        <div class="teclas">

            <button class="tecla tecla-acao" data-action="clear">AC</button>
            <button class="tecla tecla-acao" data-action="sign">+/-</button>
            <button class="tecla tecla-acao" data-action="percent">%</button>
            <button class="tecla tecla-operador" data-operator="/">÷</button>

            <button class="tecla tecla-numero" data-number="7">7</button>
            <button class="tecla tecla-numero" data-number="8">8</button>
            <button class="tecla tecla-numero" data-number="9">9</button>
            <button class="tecla tecla-operador" data-operator="*">×</button>

            <button class="tecla tecla-numero" data-number="4">4</button>
            <button class="tecla tecla-numero" data-number="5">5</button>
            <button class="tecla tecla-numero" data-number="6">6</button>
            <button class="tecla tecla-operador" data-operator="-">−</button>

            <button class="tecla tecla-numero" data-number="1">1</button>
            <button class="tecla tecla-numero" data-number="2">2</button>
            <button class="tecla tecla-numero" data-number="3">3</button>
            <button class="tecla tecla-operador" data-operator="+">+</button>

            <button class="tecla tecla-numero tecla-zero" data-number="0">0</button>
            <button class="tecla tecla-numero" data-action="decimal">,</button>
            <button class="tecla tecla-igual" data-action="equals">=</button>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
